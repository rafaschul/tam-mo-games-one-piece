<title>ONE PIECE — TAM MO GAMES</title>
<style>

<div id="wrap">
  <canvas id="c"></canvas>

</div>
<script>
// ═══════════════════════════════════════════════════════════════════
//  TAM MO GAMES · ONE PIECE JUMP & RUN · v4.0
//  Laser · Enhanced World · Fixed Jump · Improved Sprites
// ═══════════════════════════════════════════════════════════════════
const W=900,H=500;
const cv=document.getElementById('c');
cv.width=W;cv.height=H;
const ctx=cv.getContext('2d');

let STATE='TITLE';
let score=0,lives=3,frameCount=0;

// ── AUDIO ───────────────────────────────────────────────────────────
let audioCtx=null;
function ensureAudio(){
  if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==='suspended')audioCtx.resume();
  // Mobile unlock: play a silent 1-frame buffer to unblock iOS/Android audio
  if(!audioCtx._unlocked){
    audioCtx._unlocked=true;
    try{
      const buf=audioCtx.createBuffer(1,1,22050);
      const src=audioCtx.createBufferSource();
      src.buffer=buf;src.connect(audioCtx.destination);
      src.start(0);
      audioCtx.resume().then(()=>{if(bgInterval===null)startBGM();});
    }catch(e){}
  }
}
function beep(f,d,t='sine',v=0.3,delay=0){
  if(!audioCtx)return;
  const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.connect(g);g.connect(audioCtx.destination);o.type=t;
  o.frequency.setValueAtTime(f,audioCtx.currentTime+delay);
  g.gain.setValueAtTime(v,audioCtx.currentTime+delay);
  g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+delay+d);
  o.start(audioCtx.currentTime+delay);o.stop(audioCtx.currentTime+delay+d+0.05);
}
const sndJump=()=>{beep(440,.12,'sine',.22);beep(587,.1,'sine',.18,.1);};
const sndCoin=()=>{beep(784,.05,'sine',.18);beep(1047,.09,'sine',.15,.05);};
const sndHit= ()=>{beep(150,.2,'sawtooth',.35);beep(80,.15,'square',.28,.1);};
const sndDef= ()=>[523,440,392,329].forEach((f,i)=>beep(f,.18,'sine',.3,i*.11));
const sndFruit=()=>[523,659,784,1047].forEach((f,i)=>beep(f,.18,'triangle',.28,i*.07));
const sndSel= ()=>{beep(523,.1,'sine',.22);beep(659,.11,'sine',.18,.1);};
const sndAbi= ()=>[392,440,523,659,784].forEach((f,i)=>beep(f,.14,'sine',.28,i*.06));
const sndLaser=()=>{beep(1400,.03,'sawtooth',.45);beep(900,.05,'square',.3,.03);beep(400,.1,'sine',.2,.06);};
const sndELaser=()=>{beep(700,.03,'square',.22);beep(1000,.04,'sawtooth',.18,.02);};

let bgInterval=null;
const MELODY=[261.6,329.6,392,440,392,329.6,261.6,0,440,392,329.6,293.7,261.6,0,329.6,392];
let mIdx=0;
function startBGM(){if(bgInterval)return;bgInterval=setInterval(()=>{if(!audioCtx)return;const f=MELODY[mIdx%MELODY.length];if(f>0)beep(f,.38,'triangle',.07);mIdx++;},350);}
function stopBGM(){if(bgInterval){clearInterval(bgInterval);bgInterval=null;}}

// ── INPUT — jump uses edge detection to prevent held-key spam ────────
const keys={},prev={};
let jumpEdge=false, jumpKeyHeld=false;

document.addEventListener('keydown',e=>{
  ensureAudio();
  const fresh=!keys[e.code];
  keys[e.code]=true;
  if(fresh&&(e.code==='Space'||e.code==='ArrowUp'||e.code==='KeyW')) jumpEdge=true;
  if(e.code==='Space'||e.code==='ArrowUp'||e.code==='KeyW') jumpKeyHeld=true;
  handleKey(e.code);
  e.preventDefault();
});
document.addEventListener('keyup',e=>{
  keys[e.code]=false;
  if(e.code==='Space'||e.code==='ArrowUp'||e.code==='KeyW') jumpKeyHeld=false;
});
cv.addEventListener('click',e=>{
  ensureAudio();startBGM();
  const r=cv.getBoundingClientRect();
  handleClick((e.clientX-r.left)*(W/r.width),(e.clientY-r.top)*(H/r.height));
});

// ── MOBILE CONTROLS ──────────────────────────────────────────────────
const joy={active:false,id:-1,bx:105,by:430,knobX:105,knobY:430,r:48,dead:10};
const MBTNS={
  jump:   {x:W-78, y:H-68, r:34,pressed:false,id:-1,label:'↑',  sub:'JUMP', col:'#27AE60',col2:'#145a2e'},
  ability:{x:W-162,y:H-108,r:28,pressed:false,id:-1,label:'⚡', sub:'POWER',col:'#E74C3C',col2:'#7B241C'},
  laser:  {x:W-78, y:H-138,r:28,pressed:false,id:-1,label:'✦',  sub:'LASER',col:'#FF8C00',col2:'#9a4d00'},
};

function cvPos(touch){
  const r=cv.getBoundingClientRect();
  return{x:(touch.clientX-r.left)*(W/r.width),y:(touch.clientY-r.top)*(H/r.height)};
}
function hitBtn(btn,x,y){const dx=x-btn.x,dy=y-btn.y;return dx*dx+dy*dy<(btn.r+14)*(btn.r+14);}

cv.addEventListener('touchstart',e=>{
  e.preventDefault();ensureAudio();startBGM();
  Array.from(e.changedTouches).forEach(t=>{
    const{x,y}=cvPos(t);
    if(STATE!=='GAME'){handleClick(x,y);return;}
    // Right side → buttons
    if(x>W/2){
      for(const[name,btn]of Object.entries(MBTNS)){
        if(hitBtn(btn,x,y)){
          btn.pressed=true;btn.id=t.identifier;
          if(name==='jump'&&!jumpKeyHeld){jumpEdge=true;jumpKeyHeld=true;}
          if(name==='ability')fireAbility();
          if(name==='laser')fireLaser();
          return;
        }
      }
    }
    // Left side → joystick
    if(!joy.active){
      joy.active=true;joy.id=t.identifier;
      joy.bx=Math.max(joy.r+8,Math.min(W/2-joy.r,x));
      joy.by=Math.max(joy.r+8,Math.min(H-8,y));
      joy.knobX=joy.bx;joy.knobY=joy.by;
    }
  });
},{passive:false});

cv.addEventListener('touchmove',e=>{
  e.preventDefault();
  Array.from(e.changedTouches).forEach(t=>{
    const{x,y}=cvPos(t);
    if(joy.active&&t.identifier===joy.id){
      const dx=x-joy.bx,dy=y-joy.by;
      const dist=Math.sqrt(dx*dx+dy*dy);
      const ang=Math.atan2(dy,dx);
      const clamped=Math.min(dist,joy.r);
      joy.knobX=joy.bx+Math.cos(ang)*clamped;
      joy.knobY=joy.by+Math.sin(ang)*clamped;
      if(dx>joy.dead){keys['ArrowRight']=true;keys['ArrowLeft']=false;}
      else if(dx<-joy.dead){keys['ArrowLeft']=true;keys['ArrowRight']=false;}
      else{keys['ArrowLeft']=false;keys['ArrowRight']=false;}
    }
    for(const[name,btn]of Object.entries(MBTNS)){
      if(btn.id===t.identifier)btn.pressed=hitBtn(btn,x,y);
    }
  });
},{passive:false});

cv.addEventListener('touchend',e=>{
  e.preventDefault();
  Array.from(e.changedTouches).forEach(t=>{
    if(joy.active&&t.identifier===joy.id){
      joy.active=false;joy.id=-1;
      joy.knobX=joy.bx;joy.knobY=joy.by;
      keys['ArrowLeft']=false;keys['ArrowRight']=false;
    }
    for(const btn of Object.values(MBTNS)){
      if(btn.id===t.identifier){btn.pressed=false;btn.id=-1;jumpKeyHeld=false;}
    }
  });
},{passive:false});

// ── CHARACTERS ───────────────────────────────────────────────────────
const CHARS={
  luffy:{name:'Monkey D. Luffy',jp:'モンキー・D・ルフィ',title:'将来の海賊王！',
    color:'#E74C3C',abilityColor:'#E74C3C',laserColor:'#FF8C00',
    speed:1.87,jumpPower:-18.2,ability:'Gomu Gomu Pistol',abilityJP:'ゴムゴム・ピストル',
    laser:'Gomu Gomu Cannon',laserJP:'ゴムゴム・キャノン'},
  sanji:{name:'Vinsmoke Sanji',jp:'ヴィンスモーク・サンジ',title:'スピードの料理人',
    color:'#F39C12',abilityColor:'#FF6B35',laserColor:'#FF4500',
    speed:2.50,jumpPower:-16.9,ability:'Flambage Shot',abilityJP:'フランベージュ・ショット',
    laser:'Diable Jambe',laserJP:'ディアブルジャンブ'},
  chopper:{name:'Tony Tony Chopper',jp:'トニートニー・チョッパー',title:'かわいいお医者さん',
    color:'#E74C3C',abilityColor:'#9B59B6',laserColor:'#9B59B6',
    speed:1.58,jumpPower:-15.6,ability:'Rumble Ball',abilityJP:'ランブルボール',
    laser:'Horn Point',laserJP:'ホーンポイント'},
};

// ── PLAYER ────────────────────────────────────────────────────────────
const player={
  x:80,y:360,vx:0,vy:0,w:36,h:48,
  onGround:false,facing:1,animFrame:0,animTimer:0,
  attackTimer:0,abilityActive:false,abilityTimer:0,abilityCooldown:0,
  laserCooldown:0,invincible:0,char:null,laserFlash:0,
};

// ── LEVEL DATA ────────────────────────────────────────────────────────
const GRAVITY=0.55,GROUND_Y=420,LEVEL_W=3600;
let platforms=[],enemies=[],collectibles=[],projectiles=[],lasers=[],particles=[];
let cameraX=0;

function buildLevel(){
  platforms=[
    // ground segments
    {x:0,   y:420,w:420,h:22,type:'ground'},{x:460, y:420,w:310,h:22,type:'ground'},
    {x:820, y:420,w:510,h:22,type:'ground'},{x:1400,y:420,w:410,h:22,type:'ground'},
    {x:1870,y:420,w:610,h:22,type:'ground'},{x:2540,y:420,w:510,h:22,type:'ground'},
    {x:3110,y:420,w:490,h:22,type:'ground'},
    // floating
    {x:180, y:340,w:110,h:14,type:'wood'}, {x:360, y:278,w:100,h:14,type:'wood'},
    {x:540, y:318,w:120,h:14,type:'wood'}, {x:690, y:248,w:90, h:14,type:'wood'},
    {x:890, y:308,w:130,h:14,type:'stone'},{x:1040,y:238,w:100,h:14,type:'stone'},
    {x:1190,y:318,w:115,h:14,type:'wood'}, {x:1440,y:268,w:105,h:14,type:'wood'},
    {x:1590,y:198,w:100,h:14,type:'gold'}, {x:1740,y:318,w:120,h:14,type:'wood'},
    {x:1990,y:268,w:115,h:14,type:'stone'},{x:2170,y:198,w:100,h:14,type:'gold'},
    {x:2340,y:318,w:105,h:14,type:'wood'}, {x:2590,y:258,w:125,h:14,type:'stone'},
    {x:2790,y:188,w:100,h:14,type:'gold'}, {x:2990,y:318,w:115,h:14,type:'wood'},
    {x:3190,y:248,w:100,h:14,type:'gold'},
    {x:3400,y:358,w:200,h:64,type:'goal'},
  ];
  enemies=[
    mk('marine',490,395), mk('marine',760,395),
    mk('sniper',1010,212), mk('pirate',1290,395),
    mk('sniper',1560,172), mk('pirate',1890,395),
    mk('marine',2100,172), mk('pirate',2390,395),
    mk('sniper',2680,162), mk('pirate',2890,395),
    mk('boss', 3230,395),
  ];
  collectibles=[];
  [[240,308],[420,248],[610,288],[740,218],[940,276],[1090,208],[1240,286],
   [1490,238],[1640,168],[1790,286],[2040,238],[2220,168],[2390,286],
   [2640,228],[2840,158],[3040,286],[3240,218]]
    .forEach(([x,y])=>collectibles.push({x,y,type:'berry',w:16,h:16,collected:false,bob:Math.random()*Math.PI*2}));
  [[690,212],[1590,162],[2790,152]]
    .forEach(([x,y])=>collectibles.push({x,y,type:'fruit',w:22,h:22,collected:false,bob:0}));
  projectiles=[];lasers=[];particles=[];cameraX=0;
  player.x=80;player.y=360;player.vx=0;player.vy=0;
  player.onGround=false;player.invincible=0;
  player.abilityActive=false;player.abilityTimer=0;
  player.abilityCooldown=0;player.laserCooldown=0;
  jumpEdge=false;jumpKeyHeld=false;
}

function mk(type,x,y){
  const cfg={
    marine:{hp:2,maxHp:2,spd:1.2,w:30,h:44,range:240,reward:100,sRange:200,sCD:140},
    sniper:{hp:1,maxHp:1,spd:0.3,w:28,h:42,range:320,reward:150,sRange:290,sCD:95},
    pirate:{hp:3,maxHp:3,spd:2.2,w:32,h:46,range:180,reward:150,sRange:0,  sCD:999},
    boss:  {hp:20,maxHp:20,spd:1.8,w:56,h:64,range:360,reward:1500,sRange:330,sCD:75},
  };
  const c=cfg[type];
  return{x,y:y-c.h,type,facing:-1,animFrame:0,animTimer:0,
    alert:false,alertTimer:0,dead:false,shootTimer:0,patrolDir:1,patrolTimer:0,...c};
}

// ── UPDATE ────────────────────────────────────────────────────────────
function update(){
  frameCount++;
  if(STATE!=='GAME'){jumpEdge=false;return;}
  const ch=CHARS[player.char];

  if(keys['ArrowLeft']||keys['KeyA']){player.vx=-ch.speed;player.facing=-1;}
  else if(keys['ArrowRight']||keys['KeyD']){player.vx=ch.speed;player.facing=1;}
  else player.vx*=0.72;

  // JUMP — only fires on fresh keypress, never while held
  if(jumpEdge&&player.onGround){
    player.vy=ch.jumpPower;player.onGround=false;
    sndJump();spawnFx(player.x+player.w/2,player.y+player.h,'#fff',4,'jump');
  }
  jumpEdge=false; // consume after one frame

  // Timers
  if(player.abilityCooldown>0)player.abilityCooldown--;
  if(player.laserCooldown>0)  player.laserCooldown--;
  if(player.attackTimer>0)    player.attackTimer--;
  if(player.invincible>0)     player.invincible--;
  if(player.laserFlash>0)     player.laserFlash--;
  if(player.abilityTimer>0){player.abilityTimer--;player.abilityActive=true;}
  else player.abilityActive=false;

  player.vy=Math.min(player.vy+GRAVITY,18);
  player.x+=player.vx;player.y+=player.vy;

  // Platform collision
  player.onGround=false;
  platforms.forEach(p=>{
    if(p.type==='goal')return;
    if(player.x+player.w>p.x&&player.x<p.x+p.w)
      if(player.vy>=0&&player.y+player.h>p.y&&player.y+player.h<p.y+p.h+20){
        player.y=p.y-player.h;player.vy=0;player.onGround=true;
      }
  });
  if(player.x<0)player.x=0;
  if(player.y>H+60){loseLife();return;}

  // Camera
  const tc=player.x-W*0.35;
  cameraX+=(tc-cameraX)*0.1;
  cameraX=Math.max(0,Math.min(LEVEL_W-W,cameraX));

  if(++player.animTimer>7){player.animTimer=0;player.animFrame=(player.animFrame+1)%4;}
  // Footstep dust when running on ground
  if(player.onGround&&Math.abs(player.vx)>1&&frameCount%8===0)
    spawnFx(player.x+player.w/2,player.y+player.h,'rgba(180,150,100,.7)',2,'dust');

  // Collectibles
  collectibles.forEach(c=>{
    if(c.collected)return;
    if(olap(player,c)){c.collected=true;
      if(c.type==='berry'){score+=50;sndCoin();spawnFx(c.x,c.y,'#FFD700',6,'burst');}
      else{score+=500;lives=Math.min(lives+1,5);sndFruit();spawnFx(c.x,c.y,'#9B59B6',10,'burst');}
    }
  });

  const goal=platforms.find(p=>p.type==='goal');
  if(goal&&olap(player,goal)){STATE='WIN';stopBGM();return;}

  // Enemy AI
  enemies.forEach(e=>{
    if(e.dead)return;
    // Death animation
    if(e.dying){
      e.dyingTimer--;
      e.dyingVy+=0.35;e.y+=e.dyingVy;
      e.dyingRot+=e.dyingSpin;
      if(e.dyingTimer<=0)e.dead=true;
      return;
    }
    const dx=(player.x+player.w/2)-(e.x+e.w/2);
    const dist=Math.abs(dx);
    if(dist<e.range){
      e.alert=true;e.alertTimer=80;e.facing=dx>0?1:-1;
      if(e.type==='pirate') e.x+=e.facing*e.spd;
      else if(e.type==='boss'){e.x+=e.facing*(dist<160?e.spd:0.6);}
      else if(e.type==='sniper'){if(dist<90)e.x-=e.facing*1.8;else if(dist>180)e.x+=e.facing*0.4;}
      else{if(dist>110)e.x+=e.facing*e.spd;}
      if(e.sRange>0&&dist<e.sRange){
        if(++e.shootTimer>=e.sCD){e.shootTimer=0;e.type==='boss'?fireBossLaser(e):fireEnemyLaser(e);}
      }
    } else {
      if(e.alertTimer>0)e.alertTimer--;else e.alert=false;
      if(++e.patrolTimer>100){e.patrolTimer=0;e.patrolDir*=-1;}
      e.x+=e.patrolDir*0.5;
    }
    // Gravity snap to platforms
    e.y+=3;
    platforms.forEach(p=>{
      if(p.type==='goal')return;
      if(e.x+e.w>p.x&&e.x<p.x+p.w&&e.y+e.h>p.y&&e.y+e.h<p.y+36)e.y=p.y-e.h;
    });
    if(++e.animTimer>10){e.animTimer=0;e.animFrame=(e.animFrame+1)%2;}

    if(!player.invincible&&!e.dying&&olap(player,e)){
      const stomp=player.vy>0&&player.y+player.h<e.y+e.h*0.42;
      if(stomp){
        e.hp-=(player.abilityActive&&player.char==='chopper')?3:1;
        score+=10;player.vy=-10;
        spawnFx(e.x+e.w/2,e.y,'#FF4444',8,'burst');
        if(e.hp<=0)killEnemy(e);
      } else loseLife();
    }
  });

  // Projectiles
  projectiles.forEach(p=>{
    p.x+=p.vx;p.y+=p.vy;p.life--;
    if(p.life<=0){p.dead=true;return;}
    enemies.forEach(e=>{
      if(e.dead||p.dead)return;
      if(olap(p,e)){e.hp-=p.dmg;p.dead=true;spawnFx(p.x,p.y,p.col,6,'burst');if(e.hp<=0)killEnemy(e);}
    });
  });
  projectiles=projectiles.filter(p=>!p.dead);

  // Lasers
  lasers.forEach(L=>{
    L.life--;if(L.life<=0){L.dead=true;return;}
    if(L.owner==='player'){
      enemies.forEach(e=>{
        if(e.dead||e.dying||e.hitByLaser===L)return;
        const b1=L.dx>0?L.wx:L.wx-L.len,b2=L.dx>0?L.wx+L.len:L.wx;
        if(e.x<b2&&e.x+e.w>b1&&e.y<L.wy+7&&e.y+e.h>L.wy-7){
          e.hp-=L.dmg;e.hitByLaser=L;
          spawnFx(e.x+e.w/2,L.wy,L.col,4,'burst');
          if(e.hp<=0)killEnemy(e);
        }
      });
    } else if(!player.invincible){
      const b1=L.dx>0?L.wx:L.wx-L.len,b2=L.dx>0?L.wx+L.len:L.wx;
      if(player.x<b2&&player.x+player.w>b1&&player.y<L.wy+9&&player.y+player.h>L.wy-9)loseLife();
    }
  });
  lasers=lasers.filter(L=>!L.dead);

  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.18;p.life--;p.a=p.life/p.ml;});
  particles=particles.filter(p=>p.life>0);
}

function killEnemy(e){
  if(e.dying||e.dead)return;
  e.dying=true;e.dyingTimer=42;e.dyingRot=0;e.dyingVy=-7;e.dyingSpin=(Math.random()>.5?.14:-.14);
  score+=e.reward;sndDef();spawnFx(e.x+e.w/2,e.y,'#FFD700',14,'burst');
}
function loseLife(){
  lives--;player.invincible=100;player.vy=-5;sndHit();
  spawnFx(player.x+player.w/2,player.y+player.h/2,'#E74C3C',12,'burst');
  if(lives<=0){STATE='GAMEOVER';stopBGM();}
}
function olap(a,b){return a.x<b.x+(b.w||16)&&a.x+(a.w||16)>b.x&&a.y<b.y+(b.h||16)&&a.y+(a.h||16)>b.y;}
function spawnFx(x,y,col,n,type){
  for(let i=0;i<n;i++){
    const a=(Math.PI*2/n)*i+Math.random()*.5;
    const spd=type==='jump'?1.2+Math.random():type==='dust'?0.8+Math.random()*1.2:2.5+Math.random()*3.5;
    const vy=type==='jump'?-2-Math.random()*2:type==='dust'?-0.5-Math.random():Math.sin(a)*spd;
    particles.push({x,y,vx:Math.cos(a)*spd*(type==='dust'?0.6:1),vy,col,life:type==='dust'?14+Math.random()*10:24+Math.random()*26,ml:50,a:1,r:type==='dust'?1.5+Math.random()*2:2+Math.random()*3.5,glow:type!=='dust'&&type!=='jump'});
  }
}

function fireLaser(){

  const wx=player.facing>0?player.x+player.w:player.x;
  const wy=player.y+player.h*0.38;
  lasers.push({wx,wy,dx:player.facing,len:700,col:ch.laserColor,w:5,life:16,maxLife:16,dmg:5,owner:'player',dead:false});
  player.laserCooldown=45;player.laserFlash=8;sndLaser();

function fireAbility(){
  if(player.abilityCooldown>0)return;
  sndAbi();
  if(player.char==='luffy'){
    projectiles.push({x:player.x+(player.facing>0?player.w:-20),y:player.y+player.h/2-5,

function fireEnemyLaser(e){

function fireBossLaser(e){

// ── HANDLERS ──────────────────────────────────────────────────────────
function handleKey(code){
  ensureAudio();startBGM();
  if(STATE==='TITLE'&&(code==='Space'||code==='Enter')){STATE='SELECT';sndSel();}
  if(STATE==='SELECT'){
    if(code==='Digit1'||code==='Numpad1')goIntro('luffy');
    if(code==='Digit2'||code==='Numpad2')goIntro('sanji');
    if(code==='Digit3'||code==='Numpad3')goIntro('chopper');
  }
  if(STATE==='INTRO'&&(code==='Space'||code==='Enter'))STATE='GAME';
  if(STATE==='GAME'){
    if(code==='KeyX'||code==='ShiftLeft'||code==='ShiftRight')fireAbility();
    if(code==='KeyZ'||code==='KeyC')fireLaser();
  }
  if((STATE==='GAMEOVER'||STATE==='WIN')&&code==='Enter'){score=0;lives=3;buildLevel();STATE='GAME';startBGM();}
  if((STATE==='GAMEOVER'||STATE==='WIN')&&code==='Escape')STATE='SELECT';
}
function handleClick(mx,my){
  if(STATE==='TITLE'){STATE='SELECT';sndSel();return;}
  if(STATE==='SELECT'){const cx=W/2;
    [{char:'luffy',x:cx-272},{char:'sanji',x:cx-82},{char:'chopper',x:cx+108}]
      .forEach(({char,x})=>{if(mx>=x&&mx<=x+160&&my>=110&&my<=350)goIntro(char);});
  }
  if(STATE==='INTRO'&&my>400)STATE='GAME';
  if(STATE==='GAMEOVER'||STATE==='WIN'){
    if(my>H/2+50&&my<H/2+94){
      if(mx>W/2-160&&mx<W/2){score=0;lives=3;buildLevel();STATE='GAME';startBGM();}
      if(mx>W/2&&mx<W/2+160)STATE='SELECT';
    }
  }
}
function goIntro(char){player.char=char;buildLevel();STATE='INTRO';sndSel();}

// ── DRAW UTILS ─────────────────────────────────────────────────────────
function box(x,y,w,h,fill,stroke='#1a1a1a',lw=3,r=4){
  ctx.save();ctx.strokeStyle=stroke;ctx.lineWidth=lw;ctx.fillStyle=fill;
  ctx.beginPath();ctx.roundRect(x,y,w,h,r);ctx.fill();ctx.stroke();ctx.restore();
}
function txt(t,x,y,size,fill,align='center',stroke=null,slw=3){
  ctx.save();ctx.font=`bold ${size}px Georgia,serif`;ctx.textAlign=align;
  if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=slw;ctx.strokeText(t,x,y);}
  ctx.fillStyle=fill;ctx.fillText(t,x,y);ctx.restore();
}
function jp(t,x,y,size,fill,align='center'){
  ctx.save();ctx.font=`${size}px serif`;ctx.textAlign=align;ctx.fillStyle=fill;ctx.fillText(t,x,y);ctx.restore();
}

// ── CHARACTER SPRITES — origin = feet (y=0) ────────────────────────────
function drawLuffy(fx,fy,facing,frame,sc=1,ability=false){
  ctx.save();ctx.translate(fx,fy);ctx.scale(facing*sc,sc);
  const bob=Math.sin(frame*.9)*1.5,ls=Math.sin(frame*1.8),as=Math.sin(frame*1.8);

  // Sandals
  ctx.fillStyle='#8B6914';ctx.strokeStyle='#5D4037';ctx.lineWidth=1.5;
  ctx.fillRect(-12,-3+ls*5+bob,12,4);ctx.strokeRect(-12,-3+ls*5+bob,12,4);
  ctx.fillRect(0,-3-ls*5+bob,12,4);ctx.strokeRect(0,-3-ls*5+bob,12,4);
  // Legs skin
  box(-11,-16+ls*5+bob,10,14,'#FDBCB4','#c9967a',1.5,2);
  box(1,-16-ls*5+bob,10,14,'#FDBCB4','#c9967a',1.5,2);
  // Shorts
  box(-13,-32+bob,26,18,'#1a4f8c','#0d2f5c',2.5,4);
  // Vest (open)
  box(-13,-56+bob,12,26,'#E74C3C','#9B2020',2.5,3);
  box(1,-56+bob,12,26,'#E74C3C','#9B2020',2.5,3);
  // Chest skin
  box(-4,-54+bob,8,24,'#FDBCB4','#c9967a',1,1);
  // Arms
  box(-26,-50+as*10+bob,13,9,'#FDBCB4','#c9967a',2,4);
  box(13,-50-as*10+bob,13,9,'#FDBCB4','#c9967a',2,4);
  // Head
  box(-16,-82+bob,32,34,'#FDBCB4','#c9967a',2.5,7);
  // Eyes — big anime style
  ctx.fillStyle='#1a1a1a';
  ctx.beginPath();ctx.ellipse(-5,-66+bob,5,5.5,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(6,-66+bob,5,5.5,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fff';
  ctx.beginPath();ctx.arc(-4,-67+bob,2.2,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(7,-67+bob,2.2,0,Math.PI*2);ctx.fill();
  // Grin (stretch when running)
  ctx.strokeStyle='#1a1a1a';ctx.lineWidth=2.5;
  ctx.beginPath();ctx.arc(0,-62+bob,9+Math.abs(ls)*2,.12,Math.PI-.12);ctx.stroke();
  // Scar under eye
  ctx.strokeStyle='#c0392b';ctx.lineWidth=2.2;
  ctx.beginPath();ctx.moveTo(-9,-65+bob);ctx.lineTo(-5,-60+bob);ctx.stroke();
  // Hat brim
  box(-19,-95+bob,38,10,'#F39C12','#8B6914',2.5,2);
  // Hat dome
  box(-13,-110+bob,26,17,'#F39C12','#8B6914',2,6);
  // Hat red band
  ctx.fillStyle='#E74C3C';ctx.fillRect(-19,-88+bob,38,5);
  // Ability: stretch arm
  if(ability){
    ctx.strokeStyle='#FDBCB4';ctx.lineWidth=10;
    ctx.beginPath();ctx.moveTo(14,-46+bob);ctx.lineTo(58,-46+bob);ctx.stroke();
    box(52,-54+bob,20,16,'#FDBCB4','#c9967a',2,4);
    ctx.globalAlpha=.4;ctx.strokeStyle='#E74C3C';ctx.lineWidth=3;
    ctx.beginPath();ctx.arc(64,-46+bob,10,0,Math.PI*2);ctx.stroke();
    ctx.globalAlpha=1;
  }
  ctx.restore();
}

// ── ENEMY SPRITES ─────────────────────────────────────────────────────
function drawEnemy(e){
  if(e.dead)return;
  const sx=e.x-cameraX,sy=e.y;
  if(sx<-90||sx>W+90)return;
  ctx.save();
  if(e.dying){
    const t=1-e.dyingTimer/42;
    ctx.globalAlpha=Math.max(0,e.dyingTimer/42);
    const cx=sx+e.w/2,cy=sy+e.h/2;
    ctx.translate(cx,cy);ctx.rotate(e.dyingRot||0);ctx.scale(1+t*.4,1+t*.4);ctx.translate(-cx,-cy);
  }
  const f=e.facing;
  ctx.translate(sx+e.w/2,sy+e.h);ctx.scale(f,1);
  const b=Math.sin(e.animFrame*Math.PI)*2.5;

  if(e.type==='marine'){
    // White trousers
    const tg=ctx.createLinearGradient(-10,0,10,0);tg.addColorStop(0,'#e8e8f0');tg.addColorStop(1,'#c8c8d8');
    ctx.fillStyle=tg;ctx.strokeStyle='#aaa';ctx.lineWidth=1.5;

// ── LASER DRAW ─────────────────────────────────────────────────────────
function drawLasers(){
  lasers.forEach(L=>{
    const pct=L.life/L.maxLife,alpha=pct<.3?pct/.3:1;
    const sx=L.wx-cameraX;
    const x1=L.dx>0?sx:sx-L.len,x2=L.dx>0?sx+L.len:sx;
    const tipX=L.dx>0?x2:x1,beamLen=x2-x1;
    ctx.save();

    // 1. Far outer bloom
    ctx.globalAlpha=alpha*.18;ctx.strokeStyle=L.col;ctx.lineWidth=L.w*10+14;
    ctx.shadowColor=L.col;ctx.shadowBlur=40;
    ctx.beginPath();ctx.moveTo(x1,L.wy);ctx.lineTo(x2,L.wy);ctx.stroke();

    // 2. Mid bloom
    ctx.globalAlpha=alpha*.38;ctx.lineWidth=L.w*5+4;ctx.shadowBlur=18;
    ctx.beginPath();ctx.moveTo(x1,L.wy);ctx.lineTo(x2,L.wy);ctx.stroke();

    // 3. Inner glow
    ctx.globalAlpha=alpha*.72;ctx.lineWidth=L.w*2;ctx.shadowBlur=8;
    ctx.beginPath();ctx.moveTo(x1,L.wy);ctx.lineTo(x2,L.wy);ctx.stroke();

    // 4. Bright core
    ctx.globalAlpha=alpha;ctx.strokeStyle='#fff';ctx.lineWidth=Math.max(1,L.w*.55);ctx.shadowBlur=3;
    ctx.beginPath();ctx.moveTo(x1,L.wy);ctx.lineTo(x2,L.wy);ctx.stroke();

    // 5. Energy rings sliding along beam
    ctx.shadowColor=L.col;ctx.shadowBlur=10;
    for(let r=0;r<3;r++){
      const rx=x1+((frameCount*4+r*Math.ceil(beamLen/3))%beamLen);
      ctx.globalAlpha=alpha*(.55-r*.12);ctx.strokeStyle=L.col;ctx.lineWidth=L.w*.9;
      ctx.beginPath();ctx.ellipse(rx,L.wy,5+r*2,L.w*1.6,0,0,Math.PI*2);ctx.stroke();
    }

    // 6. Electric arc jitter
    ctx.shadowBlur=6;ctx.lineWidth=1;ctx.strokeStyle=L.col;
    for(let a=0;a<3;a++){
      ctx.globalAlpha=alpha*.3*Math.random();
      const ax=x1+Math.random()*beamLen,ay=L.wy+(Math.random()-.5)*14;
      ctx.beginPath();ctx.moveTo(ax,L.wy);ctx.lineTo(ax+(Math.random()-.5)*18,ay);
      ctx.lineTo(ax+8,L.wy);ctx.stroke();
    }

    // 7. Muzzle flash at origin (first 25% of life)
    if(pct>.75){
      const mf=(pct-.75)/.25;
      ctx.globalAlpha=alpha*mf*.95;
      ctx.fillStyle='#fff';ctx.shadowColor=L.col;ctx.shadowBlur=28;
      ctx.beginPath();ctx.arc(sx,L.wy,L.w*3,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle=L.col;ctx.lineWidth=2;
      for(let i=0;i<6;i++){const a=(Math.PI*2/6)*i;
        ctx.beginPath();ctx.moveTo(sx,L.wy);ctx.lineTo(sx+Math.cos(a)*18*mf,L.wy+Math.sin(a)*18*mf);ctx.stroke();}
    }

    // 8. Impact burst at tip (ongoing)
    ctx.shadowColor=L.col;ctx.shadowBlur=16;
    for(let i=0;i<5;i++){
      ctx.globalAlpha=alpha*Math.random()*.75;
      ctx.fillStyle=i<2?'#fff':L.col;
      ctx.beginPath();ctx.arc(tipX+(Math.random()-.5)*16,L.wy+(Math.random()-.5)*16,1.2+Math.random()*2.2,0,Math.PI*2);ctx.fill();
    }
    // Starburst at tip
    ctx.globalAlpha=alpha*.6;ctx.strokeStyle='#fff';ctx.lineWidth=1.5;ctx.shadowBlur=5;
    for(let i=0;i<6;i++){const a=(Math.PI*2/6)*i+frameCount*.12;const r=7+Math.random()*6;
      ctx.beginPath();ctx.moveTo(tipX,L.wy);ctx.lineTo(tipX+Math.cos(a)*r,L.wy+Math.sin(a)*r);ctx.stroke();}

    ctx.shadowBlur=0;ctx.globalAlpha=1;
    ctx.restore();
  });
}

// ── ENVIRONMENT HELPERS ────────────────────────────────────────────────
function drawPalm(wx,wy,h=60){
  const sx=wx-cameraX;
  if(sx<-100||sx>W+100)return;
  ctx.save();
  const sway=Math.sin(frameCount*.018+wx*.008)*.05;
  const sw2=sway*h*2.2;
  // Trunk shadow
  ctx.strokeStyle='rgba(0,0,0,.18)';ctx.lineWidth=10;
  ctx.beginPath();ctx.moveTo(sx+4,wy);ctx.quadraticCurveTo(sx+14,wy-h*.5,sx+sw2+4,wy-h);ctx.stroke();
  // Trunk with gradient
  const tg=ctx.createLinearGradient(sx-5,wy,sx+5,wy);
  tg.addColorStop(0,'#6B4F10');tg.addColorStop(.4,'#A07828');tg.addColorStop(1,'#7a5e12');
  ctx.strokeStyle=tg;ctx.lineWidth=9;
  ctx.beginPath();ctx.moveTo(sx,wy);ctx.quadraticCurveTo(sx+10,wy-h*.5,sx+sw2,wy-h);ctx.stroke();
  // Trunk ring marks
  ctx.strokeStyle='rgba(80,50,10,.4)';ctx.lineWidth=1.5;
  for(let i=1;i<5;i++){
    const ty2=wy-h*(i/5),tx2=sx+sw2*(i/5)+10*(i/5);
    ctx.beginPath();ctx.moveTo(tx2-5,ty2);ctx.lineTo(tx2+5,ty2+3);ctx.stroke();
  }
  const tx=sx+sw2,ty=wy-h;
  // Leaves with layering
  const leafData=[[-1.3,-0.2,40],[-0.9,-0.75,38],[0,-1.05,42],[0.9,-0.75,38],[1.3,-0.2,40],[-0.5,-1.15,36],[0.5,-1.15,36]];
  // Leaf shadows first
  ctx.strokeStyle='rgba(0,0,0,.12)';ctx.lineWidth=5;
  leafData.forEach(([dx,dy,len])=>{
    ctx.beginPath();ctx.moveTo(tx+2,ty+2);ctx.quadraticCurveTo(tx+dx*len*.5+2,ty+dy*len*.5+8,tx+dx*len+2,ty+dy*len+2);ctx.stroke();
  });
  // Leaves — dark green base
  ctx.strokeStyle='#1B5E20';ctx.lineWidth=5;
  leafData.forEach(([dx,dy,len])=>{
    ctx.beginPath();ctx.moveTo(tx,ty);ctx.quadraticCurveTo(tx+dx*len*.5,ty+dy*len*.5+4,tx+dx*len,ty+dy*len);ctx.stroke();
  });
  // Leaves — bright green overlay
  ctx.strokeStyle='#388E3C';ctx.lineWidth=3;
  leafData.forEach(([dx,dy,len])=>{
    ctx.beginPath();ctx.moveTo(tx,ty);ctx.quadraticCurveTo(tx+dx*len*.4,ty+dy*len*.4+3,tx+dx*len*.9,ty+dy*len*.9);ctx.stroke();
  });
  // Leaf highlight
  ctx.strokeStyle='#66BB6A';ctx.lineWidth=1.2;
  leafData.forEach(([dx,dy,len])=>{
    ctx.beginPath();ctx.moveTo(tx,ty);ctx.quadraticCurveTo(tx+dx*len*.3,ty+dy*len*.3+2,tx+dx*len*.7,ty+dy*len*.7);ctx.stroke();
  });
  // Coconuts with gradient
  [[0,-7],[9,-3],[-7,-4]].forEach(([ox,oy])=>{
    const cg=ctx.createRadialGradient(tx+ox-1,ty+oy-1,1,tx+ox,ty+oy,5);
    cg.addColorStop(0,'#8B6040');cg.addColorStop(1,'#3a1a00');
    ctx.fillStyle=cg;ctx.strokeStyle='#2a0e00';ctx.lineWidth=1;
    ctx.beginPath();ctx.arc(tx+ox,ty+oy,5,0,Math.PI*2);ctx.fill();ctx.stroke();
  });
  ctx.restore();
}

// Distant island silhouette
function drawBgIsland(wx,wy,w,h,col){
  const sx=wx-cameraX*.15;
  if(sx>W+w||sx+w<0)return;
  ctx.fillStyle=col;
  ctx.beginPath();ctx.moveTo(sx,wy);ctx.quadraticCurveTo(sx+w*.3,wy-h,sx+w*.5,wy-h*.9);
  ctx.quadraticCurveTo(sx+w*.7,wy-h*.8,sx+w*.85,wy-h*.4);
  ctx.quadraticCurveTo(sx+w,wy-h*.1,sx+w,wy);ctx.closePath();ctx.fill();
  // Trees on island
  ctx.strokeStyle=col==='#2c4a6b'?'#1a3040':'#1a2f18';ctx.lineWidth=2;
  for(let t=0;t<3;t++){
    const tx=sx+w*.2+t*w*.25,ty2=wy-h*.4-t*8;
    ctx.beginPath();ctx.moveTo(tx,wy);ctx.lineTo(tx,ty2);ctx.stroke();
    ctx.fillStyle=col==='#2c4a6b'?'#1a3a50':'#1a3518';
    ctx.beginPath();ctx.arc(tx,ty2,8,0,Math.PI*2);ctx.fill();
  }
}

  // Far mountains (far parallax ~8%)
  [[40,365,130,88,'#6a90b8'],[220,348,175,100,'#5a80a8'],[440,358,150,82,'#6080a0'],
   [680,350,190,95,'#5878a0'],[940,362,140,78,'#6888b0'],[1140,348,180,98,'#5878a0']]
    .forEach(([mx,my,mw,mh,mc])=>{
      const sx=mx-cameraX*.08;if(sx>W+mw||sx+mw<0)return;
      const mg=ctx.createLinearGradient(sx,my-mh,sx,my);mg.addColorStop(0,mc);mg.addColorStop(1,'rgba(90,128,168,.1)');
      ctx.fillStyle=mg;
      ctx.beginPath();ctx.moveTo(sx,my);ctx.quadraticCurveTo(sx+mw*.35,my-mh*1.1,sx+mw*.5,my-mh);
      ctx.quadraticCurveTo(sx+mw*.65,my-mh*.9,sx+mw*.8,my-mh*.6);ctx.quadraticCurveTo(sx+mw,my-mh*.1,sx+mw,my);
      ctx.closePath();ctx.fill();
      // Snow caps
      ctx.fillStyle='rgba(255,255,255,.25)';
      ctx.beginPath();ctx.moveTo(sx+mw*.42,my-mh*.92);ctx.lineTo(sx+mw*.5,my-mh);ctx.lineTo(sx+mw*.58,my-mh*.92);ctx.closePath();ctx.fill();
    });

  // Far parallax background islands (15%)
  [[200,382,170,74,'rgba(80,120,165,.38)'],[550,392,210,84,'rgba(70,110,155,.3)'],
   [900,378,190,78,'rgba(65,105,150,.26)'],[1250,386,165,70,'rgba(60,100,148,.22)'],
   [1550,382,195,76,'rgba(75,115,160,.32)']]
    .forEach(([bx,by,bw,bh,bc])=>drawBgIsland(bx,by,bw,bh,bc));

  // Seabirds flying (animated)
  ctx.strokeStyle='#2a4a6a';ctx.lineWidth=1.5;
  [[150,90,1.2],[450,70,0.9],[750,105,1.4],[1100,80,1.1]].forEach(([bx,by,spd],i)=>{
    const ox=((bx*2-(cameraX*.18)+frameCount*spd*0.6+i*600)%(W*2.5+400))-400;
    const wingFlap=Math.sin(frameCount*.15+i)*8;
    ctx.beginPath();ctx.moveTo(ox-8,by);ctx.quadraticCurveTo(ox-4,by+wingFlap,ox,by);ctx.quadraticCurveTo(ox+4,by+wingFlap,ox+8,by);ctx.stroke();
  });

  // Layered clouds with shadow
  [[120,68,60,28],[310,48,72,32],[590,74,58,26],[810,54,66,30],[1060,72,62,28]].forEach(([cx,cy,cw,ch],i)=>{
    const ox=((-(cameraX*.22)+cx*3.2+i*510)%(W*3.8+400))-400;
    // Cloud shadow
    ctx.fillStyle='rgba(100,140,180,.18)';
    ctx.beginPath();ctx.ellipse(ox+6,cy+8,cw*.9,ch*.6,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(ox+46,cy+12,cw*.7,ch*.5,0,0,Math.PI*2);ctx.fill();
    // Cloud body
    ctx.fillStyle='rgba(255,255,255,.92)';
    ctx.beginPath();ctx.ellipse(ox,cy,cw,ch,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(ox+cw*.7,cy+ch*.25,cw*.65,ch*.8,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(ox-cw*.6,cy+ch*.3,cw*.55,ch*.7,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(ox+cw*.2,cy-ch*.4,cw*.5,ch*.65,0,0,Math.PI*2);ctx.fill();
    // Cloud highlight
    ctx.fillStyle='rgba(255,255,255,.6)';
    ctx.beginPath();ctx.ellipse(ox-cw*.2,cy-ch*.2,cw*.35,ch*.4,-.2,0,Math.PI*2);ctx.fill();
  });

  // Ocean with deep gradient
  const wg=ctx.createLinearGradient(0,GROUND_Y+16,0,H);
  wg.addColorStop(0,'#1a7fc5');wg.addColorStop(.2,'#1565a8');wg.addColorStop(.6,'#0e4a8a');wg.addColorStop(1,'#082a5a');
  ctx.fillStyle=wg;ctx.fillRect(0,GROUND_Y+16,W,H-GROUND_Y-16);

  // Ocean light caustics
  ctx.save();ctx.globalAlpha=.08;
  for(let i=0;i<8;i++){
    const lx=((i*140-cameraX*.3+frameCount*.8)%(W+120))-60;
    const ly=GROUND_Y+30+i*7;
    ctx.fillStyle='#A8D8FF';
    ctx.beginPath();ctx.ellipse(lx,ly,18+Math.sin(frameCount*.04+i)*6,3,Math.sin(frameCount*.02+i)*.4,0,Math.PI*2);ctx.fill();
  }
  ctx.restore();

  // Wave layers — 4 deep
  for(let layer=0;layer<4;layer++){
    const alpha=[.65,.42,.28,.16][layer],spd=[1.8,1.2,0.75,0.4][layer],off=[0,14,26,38][layer];
    const wCol=[`rgba(93,193,246,${alpha})`,`rgba(73,173,226,${alpha})`,`rgba(53,153,206,${alpha})`,`rgba(33,133,186,${alpha})`][layer];
    ctx.strokeStyle=wCol;ctx.lineWidth=2+layer*.3;
    for(let wx=-90;wx<W+90;wx+=65){
      const ox=((frameCount*spd+wx*1.8+layer*90)%(W+90))-90;
      ctx.beginPath();ctx.moveTo(ox,GROUND_Y+20+off);ctx.quadraticCurveTo(ox+32,GROUND_Y+9+off,ox+65,GROUND_Y+20+off);ctx.stroke();
    }
  }
  // Foam strip at waterline
  ctx.fillStyle='rgba(255,255,255,.22)';ctx.fillRect(0,GROUND_Y+16,W,5);
  // Secondary foam highlights
  ctx.strokeStyle='rgba(255,255,255,.35)';ctx.lineWidth=1.5;
  for(let wx=0;wx<W;wx+=50){
    const ox=((wx-cameraX*.05+frameCount*.5)%(W+50))-25;
    ctx.beginPath();ctx.moveTo(ox,GROUND_Y+21);ctx.lineTo(ox+18,GROUND_Y+21);ctx.stroke();
  }

  // Platforms
  platforms.forEach(p=>{
    const px=p.x-cameraX,py=p.y;
    if(px>W+10||px+p.w<-10)return;
    if(p.type==='goal'){
      // Treasure island goal
      ctx.fillStyle='#C8A465';ctx.fillRect(px,py,p.w,p.h);
      ctx.fillStyle='#A0835A';ctx.fillRect(px,py+8,p.w,p.h-8);
      ctx.strokeStyle='#8B6914';ctx.lineWidth=3;ctx.strokeRect(px,py,p.w,p.h);
      txt('🏁 GOAL — ゴール',px+p.w/2,py+p.h/2+6,12,'#FFD700');
      // Flag pole
      ctx.strokeStyle='#8B6914';ctx.lineWidth=5;
      ctx.beginPath();ctx.moveTo(px+p.w/2,py);ctx.lineTo(px+p.w/2,py-58);ctx.stroke();
      ctx.fillStyle='#E74C3C';
      ctx.beginPath();ctx.moveTo(px+p.w/2,py-58);ctx.lineTo(px+p.w/2+36,py-44);ctx.lineTo(px+p.w/2,py-30);ctx.closePath();ctx.fill();
      // Skull on flag
      ctx.strokeStyle='#1a1a1a';ctx.lineWidth=1;ctx.stroke();
      jp('☠',px+p.w/2+14,py-40,12,'#fff');
      return;
    }
    // Drop shadow
    ctx.fillStyle='rgba(0,0,0,.2)';ctx.beginPath();ctx.roundRect(px+4,py+5,p.w,p.h,3);ctx.fill();

    if(p.type==='ground'){
      // Layered earth
      const dg=ctx.createLinearGradient(px,py,px,py+p.h);
      dg.addColorStop(0,'#8B6914');dg.addColorStop(.3,'#7a5e12');dg.addColorStop(1,'#4a3508');
      ctx.fillStyle=dg;ctx.beginPath();ctx.roundRect(px,py,p.w,p.h,2);ctx.fill();
      ctx.strokeStyle='#5a4008';ctx.lineWidth=2;ctx.stroke();
      // Dirt texture streaks
      ctx.strokeStyle='rgba(60,40,0,.25)';ctx.lineWidth=1;
      for(let gx=px+12;gx<px+p.w-8;gx+=22){ctx.beginPath();ctx.moveTo(gx,py+6);ctx.lineTo(gx+8,py+p.h-2);ctx.stroke();}
      // Grass top - layered
      const gg=ctx.createLinearGradient(px,py-4,px,py+6);
      gg.addColorStop(0,'#5eca60');gg.addColorStop(.5,'#4CAF50');gg.addColorStop(1,'#388E3C');
      ctx.fillStyle=gg;ctx.fillRect(px,py,p.w,6);
      ctx.fillStyle='#2E7D32';ctx.fillRect(px,py+6,p.w,3);
      // Grass tufts
      for(let gx=px+8;gx<px+p.w-4;gx+=14){
        const h=3+Math.sin(gx*.3)*2;
        ctx.fillStyle='#66BB6A';ctx.fillRect(gx,py-h,2,h+2);
        ctx.fillStyle='#4CAF50';ctx.fillRect(gx+5,py-h+1,2,h);
        ctx.fillStyle='#81C784';ctx.fillRect(gx+3,py-h+2,1,h-1);
      }
      // Small flowers
      for(let gx=px+25;gx<px+p.w-10;gx+=55){
        ctx.fillStyle='#FFD700';ctx.beginPath();ctx.arc(gx,py-5,2,0,Math.PI*2);ctx.fill();
        ctx.strokeStyle='#FFF';ctx.lineWidth=.8;ctx.stroke();
      }
    } else if(p.type==='wood'){
      const wdg=ctx.createLinearGradient(px,py,px,py+p.h);
      wdg.addColorStop(0,'#E8C8A0');wdg.addColorStop(.3,'#DEB887');wdg.addColorStop(1,'#A0784a');
      ctx.fillStyle=wdg;ctx.beginPath();ctx.roundRect(px,py,p.w,p.h,3);ctx.fill();
      ctx.strokeStyle='#8B5E3C';ctx.lineWidth=2;ctx.stroke();
      // Wood grain lines
      ctx.strokeStyle='rgba(100,60,20,.25)';ctx.lineWidth=1;
      for(let gx=px+14;gx<px+p.w-6;gx+=14){ctx.beginPath();ctx.moveTo(gx,py+1);ctx.bezierCurveTo(gx+2,py+4,gx-1,py+9,gx+1,py+p.h-1);ctx.stroke();}
      // Top highlight
      ctx.fillStyle='rgba(255,255,255,.2)';ctx.fillRect(px+2,py+1,p.w-4,3);
      // Nails
      ctx.fillStyle='#888';
      [[px+8,py+3],[px+p.w-8,py+3]].forEach(([nx,ny])=>{ctx.beginPath();ctx.arc(nx,ny,2,0,Math.PI*2);ctx.fill();});
    } else if(p.type==='stone'){
      const stg=ctx.createLinearGradient(px,py,px,py+p.h);
      stg.addColorStop(0,'#B0B0B0');stg.addColorStop(.4,'#8E8E8E');stg.addColorStop(1,'#5E5E5E');
      ctx.fillStyle=stg;ctx.beginPath();ctx.roundRect(px,py,p.w,p.h,4);ctx.fill();
      ctx.strokeStyle='#4a4a4a';ctx.lineWidth=2;ctx.stroke();
      // Stone block seams
      ctx.strokeStyle='rgba(60,60,60,.35)';ctx.lineWidth=1.5;
      const brickW=Math.max(20,p.w/Math.round(p.w/28));
      for(let bx=px;bx<px+p.w;bx+=brickW){ctx.beginPath();ctx.moveTo(bx,py);ctx.lineTo(bx,py+p.h);ctx.stroke();}
      ctx.beginPath();ctx.moveTo(px,py+p.h/2);ctx.lineTo(px+p.w,py+p.h/2);ctx.stroke();
      // Moss patches on top
      ctx.fillStyle='rgba(60,120,40,.45)';
      for(let mx=px+10;mx<px+p.w-8;mx+=32){ctx.beginPath();ctx.ellipse(mx,py+2,8,3,0,0,Math.PI);ctx.fill();}
      // Top highlight
      ctx.fillStyle='rgba(255,255,255,.12)';ctx.fillRect(px+2,py+1,p.w-4,4);
    } else if(p.type==='gold'){
      const gg2=ctx.createLinearGradient(px,py,px,py+p.h);
      gg2.addColorStop(0,'#FFE57A');gg2.addColorStop(.3,'#FFD700');gg2.addColorStop(.7,'#C8A000');gg2.addColorStop(1,'#8B6914');
      ctx.fillStyle=gg2;ctx.beginPath();ctx.roundRect(px,py,p.w,p.h,3);ctx.fill();
      ctx.strokeStyle='#8B6914';ctx.lineWidth=2;ctx.stroke();
      // Sparkle
      if(Math.floor(frameCount/8)%3===0){
        ctx.fillStyle='rgba(255,255,255,.9)';ctx.shadowColor='#FFD700';ctx.shadowBlur=12;
        ctx.beginPath();ctx.arc(px+p.w/3,py+3,3,0,Math.PI*2);ctx.fill();
        ctx.beginPath();ctx.arc(px+p.w*2/3,py+4,2,0,Math.PI*2);ctx.fill();
        ctx.shadowBlur=0;
      }
      // Shine strip
      ctx.fillStyle='rgba(255,255,255,.25)';ctx.fillRect(px+3,py+2,p.w-6,4);
    }
  });

  // Palm trees on ground platforms
  [[80,420],[320,420],[600,420],[840,420],[1020,420],
   [1450,420],[1700,420],[1960,420],[2150,420],[2600,420],[2900,420],[3150,420]]
    .forEach(([px,py])=>drawPalm(px,py,55+(px%3)*12));

  // Collectibles
  collectibles.forEach(c=>{
    if(c.collected)return;
    const cx=c.x-cameraX;if(cx<-22||cx>W+22)return;
    const bob=Math.sin(frameCount*.09+c.bob)*3;
    if(c.type==='berry'){
      // Spinning coin (squish effect to simulate rotation)
      const spin=Math.cos(frameCount*.12+c.bob);
      const coinW=Math.abs(spin)*10+1,coinH=10;
      const coinX=cx+8,coinY=c.y+8+bob;
      // Coin shadow
      ctx.fillStyle='rgba(0,0,0,.2)';ctx.beginPath();ctx.ellipse(coinX+2,coinY+10,coinW,3,0,0,Math.PI*2);ctx.fill();
      // Coin rim (always visible)
      ctx.strokeStyle='#B8860B';ctx.lineWidth=3;
      ctx.beginPath();ctx.ellipse(coinX,coinY,coinW+2,coinH+2,0,0,Math.PI*2);ctx.stroke();
      // Coin face
      const cg=ctx.createRadialGradient(coinX-coinW*.3,coinY-3,1,coinX,coinY,coinH+1);
      cg.addColorStop(0,'#FFF176');cg.addColorStop(.4,'#FFD700');cg.addColorStop(1,'#C8A000');
      ctx.fillStyle=cg;ctx.beginPath();ctx.ellipse(coinX,coinY,coinW,coinH,0,0,Math.PI*2);ctx.fill();
      // Coin letter / shine
      if(spin>0.2){
        ctx.fillStyle='#8B6914';ctx.font='bold 9px Georgia';ctx.textAlign='center';ctx.fillText('B',coinX,coinY+3);
        ctx.fillStyle='rgba(255,255,255,.5)';ctx.beginPath();ctx.ellipse(coinX-coinW*.3,coinY-3,coinW*.25,coinH*.3,-.3,0,Math.PI*2);ctx.fill();
      }
    } else {
      // Devil fruit — ornate glowing orb
      const fx=cx+11,fy=c.y+11+bob;
      const pulse=1+Math.sin(frameCount*.08+c.bob)*.08;
      // Outer glow ring
      ctx.shadowColor='#9B59B6';ctx.shadowBlur=22;
      ctx.strokeStyle='rgba(155,89,182,.35)';ctx.lineWidth=4;
      ctx.beginPath();ctx.arc(fx,fy,17*pulse,0,Math.PI*2);ctx.stroke();
      ctx.shadowBlur=0;
      // Second ring
      ctx.strokeStyle='rgba(200,120,240,.25)';ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(fx,fy,21*pulse,0,Math.PI*2);ctx.stroke();
      // Body gradient
      const rc=ctx.createRadialGradient(fx-3,fy-3,1,fx,fy,12);
      rc.addColorStop(0,'#E67E22');rc.addColorStop(.35,'#D35400');rc.addColorStop(.65,'#9B59B6');rc.addColorStop(1,'#4a1a60');
      ctx.fillStyle=rc;ctx.beginPath();ctx.arc(fx,fy,12,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='#5B2C6F';ctx.lineWidth=2;ctx.stroke();
      // Swirl pattern
      ctx.save();ctx.translate(fx,fy);ctx.rotate(frameCount*.02+c.bob);
      ctx.strokeStyle='rgba(255,255,255,.5)';ctx.lineWidth=1.5;
      ctx.beginPath();ctx.arc(0,0,7,.3,3.8);ctx.stroke();
      ctx.strokeStyle='rgba(255,220,100,.35)';ctx.lineWidth=1;
      ctx.beginPath();ctx.arc(0,0,4,2.5,6.5);ctx.stroke();
      ctx.restore();
      // Highlight
      ctx.fillStyle='rgba(255,255,255,.4)';ctx.beginPath();ctx.ellipse(fx-4,fy-4,4,3,-.5,0,Math.PI*2);ctx.fill();
      // Sparkle at top
      if(Math.floor(frameCount/6)%3===0){
        ctx.fillStyle='rgba(255,255,255,.9)';ctx.shadowColor='#fff';ctx.shadowBlur=8;
        ctx.beginPath();ctx.arc(fx,fy-13,2,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
      }
    }
  });

  // Enemies
  enemies.forEach(e=>{if(!e.dead)drawEnemy(e);});

  // Lasers
  drawLasers();

  // Projectiles
  projectiles.forEach(p=>{
    const px=p.x-cameraX;
    if(p.type==='punch'){
      // Gomu Gomu fist with motion blur
      ctx.save();
      const pct=p.life/55;
      for(let i=0;i<4;i++){
        ctx.globalAlpha=(1-i*.2)*pct*.7;
        ctx.fillStyle='#FDBCB4';ctx.strokeStyle='#E74C3C';ctx.lineWidth=1.5;
        ctx.beginPath();ctx.roundRect(px-(p.vx<0?0:i*8),p.y,p.w,p.h,4);ctx.fill();ctx.stroke();
      }
      ctx.globalAlpha=1;
      // Knuckle lines
      ctx.strokeStyle='#c9967a';ctx.lineWidth=1.5;
      for(let i=0;i<3;i++){ctx.beginPath();ctx.moveTo(px+4+i*5,p.y+2);ctx.lineTo(px+4+i*5,p.y+p.h-2);ctx.stroke();}
      ctx.restore();
    } else {
      // Fire/energy ball with detailed glow
      const cx=px+p.w/2,cy=p.y+p.h/2,r=p.w/2;
      const pct=p.life/28;
      ctx.save();
      ctx.shadowColor=p.col;ctx.shadowBlur=18;
      const fg=ctx.createRadialGradient(cx-r*.3,cy-r*.3,r*.1,cx,cy,r);
      fg.addColorStop(0,'#fff');fg.addColorStop(.3,p.col);fg.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=fg;ctx.globalAlpha=pct;
      ctx.beginPath();ctx.arc(cx,cy,r+4,0,Math.PI*2);ctx.fill();
      ctx.shadowBlur=0;ctx.restore();
    }
  });

  // Particles — with glow for burst type
  particles.forEach(p=>{
    ctx.save();ctx.globalAlpha=p.a;
    if(p.glow){ctx.shadowColor=p.col;ctx.shadowBlur=8;}
    ctx.fillStyle=p.col;
    ctx.beginPath();ctx.arc(p.x-cameraX,p.y,p.r,0,Math.PI*2);ctx.fill();
    ctx.restore();
  });
  ctx.globalAlpha=1;

  // Player
  if(!(player.invincible>0&&Math.floor(frameCount/4)%2===0)){
    const px=player.x-cameraX,ch=CHARS[player.char];
    if(player.laserFlash>0){ctx.shadowColor=ch.laserColor;ctx.shadowBlur=30;}
    else if(player.abilityActive){ctx.shadowColor=ch.abilityColor;ctx.shadowBlur=22;}
    drawChar(player.char,px+player.w/2,player.y+player.h,player.facing,player.animFrame,1,player.abilityActive);
    ctx.shadowBlur=0;
  }
  drawHUD();
}

function drawHUD(){
  box(0,0,W,40,'rgba(0,0,0,.72)','transparent',0,0);
  const ch=CHARS[player.char];
  txt(`❤ x${lives}`,12,26,14,'#E74C3C','left');
  txt(`SCORE: ${score.toLocaleString()}`,W/2,26,14,'#FFD700');
  txt(ch.name,W-12,15,12,ch.color,'right');
  jp(ch.jp,W-12,28,10,'#888');
  // Ability bar
  const mab=player.char==='chopper'?300:player.char==='sanji'?90:60;
  box(10,42,120,9,'#333','#555',1,2);
  if(!player.abilityCooldown){ctx.fillStyle=ch.abilityColor;ctx.fillRect(11,43,118,7);txt('X: '+ch.ability,70,50,8,'#fff');}
  else{ctx.fillStyle=ch.abilityColor;ctx.globalAlpha=.4;ctx.fillRect(11,43,118*(1-player.abilityCooldown/mab),7);ctx.globalAlpha=1;txt('X 充電…',70,50,8,'#555');}
  // Laser bar
  box(140,42,112,9,'#333','#555',1,2);
  if(!player.laserCooldown){
    ctx.fillStyle=ch.laserColor;ctx.shadowColor=ch.laserColor;ctx.shadowBlur=6;
    ctx.fillRect(141,43,110,7);ctx.shadowBlur=0;txt('Z: LASER',196,50,8,'#fff');
  } else {
    ctx.fillStyle=ch.laserColor;ctx.globalAlpha=.4;ctx.fillRect(141,43,110*(1-player.laserCooldown/45),7);ctx.globalAlpha=1;txt('Z 充電…',196,50,8,'#555');
  }
  txt('STAGE 1 — 東の海',W/2,50,10,'#F39C12');
}

function drawOverlay(title,titleJP,col,msg){
  ctx.fillStyle='rgba(0,0,0,.72)';ctx.fillRect(0,0,W,H);
  const pw=460,ph=280,px=(W-pw)/2,py=(H-ph)/2;
  box(px,py,pw,ph,'#FFFEF0','#1a1a1a',5,10);
  ctx.fillStyle=col;ctx.fillRect(px,py,pw,52);ctx.strokeStyle='#1a1a1a';ctx.lineWidth=3;ctx.strokeRect(px,py,pw,52);
  txt(title,W/2,py+36,38,'#fff','center','#1a1a1a',5);
  jp(titleJP,W/2,py+72,18,'#FFD700');jp(msg,W/2,py+100,14,'#555');
  txt(`SCORE: ${score.toLocaleString()}`,W/2,py+134,22,'#1a1a1a');
  box(px+20,py+160,200,52,col,'#1a1a1a',3,8);txt('RETRY (Enter)',W/2-60,py+191,15,'#fff','center');
  box(px+240,py+160,200,52,'#555','#1a1a1a',3,8);txt('SELECT (Esc)',W/2+100,py+191,15,'#fff','center');
  txt('© 2024 TAM MO GAMES',W/2,py+ph-12,10,'#aaa');
}

// ── MOBILE CONTROLS DRAW ────────────────────────────────────────────────
function drawMobileControls(){
  if(STATE!=='GAME')return;
  ctx.save();

  // ── Joystick ──
  // Base ring
  ctx.globalAlpha=.38;
  ctx.strokeStyle='#fff';ctx.lineWidth=4;
  ctx.beginPath();ctx.arc(joy.bx,joy.by,joy.r,0,Math.PI*2);ctx.stroke();
  // Base fill
  ctx.fillStyle='rgba(255,255,255,.12)';
  ctx.beginPath();ctx.arc(joy.bx,joy.by,joy.r,0,Math.PI*2);ctx.fill();
  // Arrow hints
  ctx.globalAlpha=.28;ctx.fillStyle='#fff';ctx.font='bold 15px Georgia';ctx.textAlign='center';
  ctx.fillText('◀',joy.bx-joy.r*.62,joy.by+5);
  ctx.fillText('▶',joy.bx+joy.r*.62,joy.by+5);
  // Knob shadow
  ctx.globalAlpha=.25;ctx.fillStyle='#000';
  ctx.beginPath();ctx.arc(joy.knobX+3,joy.knobY+4,20,0,Math.PI*2);ctx.fill();
  // Knob gradient
  ctx.globalAlpha=joy.active?.92:.72;
  const kg=ctx.createRadialGradient(joy.knobX-6,joy.knobY-6,2,joy.knobX,joy.knobY,22);
  kg.addColorStop(0,'#ffffff');kg.addColorStop(.5,'#d0d0d0');kg.addColorStop(1,'rgba(160,160,160,.8)');
  ctx.fillStyle=kg;ctx.strokeStyle='rgba(255,255,255,.7)';ctx.lineWidth=2.5;
  ctx.beginPath();ctx.arc(joy.knobX,joy.knobY,22,0,Math.PI*2);ctx.fill();ctx.stroke();
  // Knob cross-hair
  ctx.globalAlpha=.35;ctx.strokeStyle='#888';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(joy.knobX-8,joy.knobY);ctx.lineTo(joy.knobX+8,joy.knobY);ctx.stroke();
  ctx.beginPath();ctx.moveTo(joy.knobX,joy.knobY-8);ctx.lineTo(joy.knobX,joy.knobY+8);ctx.stroke();

  // ── Buttons ──
  for(const[name,btn]of Object.entries(MBTNS)){
    const p=btn.pressed,by2=btn.y+(p?3:0);
    // Shadow
    ctx.globalAlpha=.3;ctx.fillStyle='#000';
    ctx.beginPath();ctx.arc(btn.x+3,by2+5,btn.r,0,Math.PI*2);ctx.fill();
    // Outer ring
    ctx.globalAlpha=p?.95:.7;
    ctx.strokeStyle='rgba(255,255,255,.6)';ctx.lineWidth=2.5;
    ctx.beginPath();ctx.arc(btn.x,by2,btn.r+4,0,Math.PI*2);
    ctx.strokeStyle=p?'rgba(255,255,255,.9)':btn.col;ctx.stroke();
    // Body
    const bg=ctx.createRadialGradient(btn.x-btn.r*.35,by2-btn.r*.35,2,btn.x,by2,btn.r);
    bg.addColorStop(0,p?btn.col2:btn.col);bg.addColorStop(1,p?'#111':btn.col2);
    ctx.fillStyle=bg;ctx.beginPath();ctx.arc(btn.x,by2,btn.r,0,Math.PI*2);ctx.fill();
    // Inner highlight
    ctx.fillStyle='rgba(255,255,255,.18)';
    ctx.beginPath();ctx.arc(btn.x-btn.r*.25,by2-btn.r*.3,btn.r*.5,0,Math.PI*2);ctx.fill();
    // Label
    ctx.globalAlpha=1;ctx.fillStyle='#fff';ctx.shadowColor='rgba(0,0,0,.7)';ctx.shadowBlur=6;
    ctx.textAlign='center';
    ctx.font=`bold ${name==='jump'?20:16}px Georgia`;
    ctx.fillText(btn.label,btn.x,by2+(name==='jump'?7:5));
    ctx.font='bold 7px Georgia';ctx.letterSpacing='1px';
    ctx.fillText(btn.sub,btn.x,by2+(name==='jump'?22:18));
    ctx.shadowBlur=0;
  }
  ctx.globalAlpha=1;ctx.restore();
}

// ── MAIN LOOP ───────────────────────────────────────────────────────────
function loop(){
  ctx.clearRect(0,0,W,H);
  update();
  switch(STATE){
    case 'TITLE':    drawTitle();break;
    case 'SELECT':   drawSelect();break;
    case 'INTRO':    drawIntro();break;
    case 'GAME':     drawGame();drawMobileControls();break;
    case 'GAMEOVER': drawGame();drawOverlay('GAME OVER','ゲームオーバー','#E74C3C','負けても立ち上がれ！');break;
    case 'WIN':      drawGame();drawOverlay('STAGE CLEAR!','ステージクリア！','#27AE60','仲間の力で勝利だ！');break;
  }
  ctx.strokeStyle='#1a1a1a';ctx.lineWidth=5;ctx.strokeRect(2,2,W-4,H-4);
  requestAnimationFrame(loop);
}
loop();
</script>
